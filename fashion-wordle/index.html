<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fashion Wordle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #fff0f6;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .game {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 22px;
    }

    .clue {
      font-style: italic;
      margin-bottom: 24px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 2px solid #ffb3d9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      background: white;
    }

    .correct {
      background: #ff4da6;
      color: white;
      border: none;
    }

    .present {
      background: black;
      color: white;
      border: none;
    }

    .absent {
      background: #ffcce6;
      color: #555;
      border: none;
    }

    .note {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 14px;
    }

    .result {
      margin-top: 22px;
      padding: 20px;
      border-radius: 20px;
      background: black;
      color: #ff4da6;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 10px 28px rgba(255,77,166,0.4);
      animation: pop 0.3s ease-out;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="game">
    <h1>Fashion Wordle</h1>
    <div class="subtitle">Guess the word</div>

    <div class="clue">“The father of haute couture.”</div>

    <div id="grid" class="grid"></div>

    <div class="note">Type on your keyboard · 6 tries</div>

    <div id="result"></div>
  </div>

  <script>
    const ANSWER = "WORTH";
    const MAX_ROWS = 6;
    const WORD_LENGTH = 5;

    let currentRow = 0;
    let currentCol = 0;
    let solved = false;

    const guesses = Array.from({ length: MAX_ROWS }, () => Array(WORD_LENGTH).fill(""));
    const grid = document.getElementById("grid");
    const result = document.getElementById("result");

    function drawGrid() {
      grid.innerHTML = "";

      guesses.forEach((row) => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "row";

        row.forEach((letter) => {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.textContent = letter;
          rowDiv.appendChild(tile);
        });

        grid.appendChild(rowDiv);
      });
    }

    function showMessage(tries, success) {
      const messages = {
        1: "bae, you're the literal beauty and brains 💅",
        2: "terrified of your level of fashion knowledge",
        3: "YOU ARE THE GOAT 🐐",
        4: "bae you're an ICON",
        5: "maybe next time bae 💔",
        6: "maybe next time bae 💔"
      };

      result.className = "result";
      result.textContent = success ? messages[tries] : messages[6];
    }

    function checkGuess() {
      const row = grid.children[currentRow];
      const guess = guesses[currentRow].join("");

      [...row.children].forEach((tile, i) => {
        tile.classList.remove("correct", "present", "absent");

        if (guess[i] === ANSWER[i]) {
          tile.classList.add("correct");
        } else if (ANSWER.includes(guess[i])) {
          tile.classList.add("present");
        } else {
          tile.classList.add("absent");
        }
      });

      if (guess === ANSWER) {
        solved = true;
        showMessage(currentRow + 1, true);
        return;
      }

      if (currentRow === MAX_ROWS - 1) {
        showMessage(MAX_ROWS, false);
        return;
      }

      currentRow++;
      currentCol = 0;
    }

    function handleKeydown(e) {
      if (solved || currentRow >= MAX_ROWS) return;

      // 🔥 THIS FIXES DOUBLE TYPING
      if (e.repeat) return;

      const key = e.key;

      if (key === "Backspace") {
        e.preventDefault();

        if (currentCol > 0) {
          currentCol--;
          guesses[currentRow][currentCol] = "";
          drawGrid();
        }
        return;
      }

      if (key === "Enter") {
        e.preventDefault();

        if (currentCol === WORD_LENGTH) {
          checkGuess();
        }
        return;
      }

      if (/^[a-zA-Z]$/.test(key)) {
        e.preventDefault();

        if (currentCol < WORD_LENGTH) {
          guesses[currentRow][currentCol] = key.toUpperCase();
          currentCol++;
          drawGrid();
        }
      }
    }

    drawGrid();
    document.addEventListener("keydown", handleKeydown);
  </script>
</body>
</html>
